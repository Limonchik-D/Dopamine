name: CI-CD Workers

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main", "develop"]
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            web/package-lock.json

      - name: Install backend deps
        run: npm ci

      - name: Install frontend deps
        run: npm --prefix ./web ci

      - name: Backend type-check
        run: npm run type-check

      - name: Frontend type-check
        run: npm run web:type-check

      - name: Build frontend
        run: npm run web:build

  deploy-staging:
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    needs: [verify]
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            web/package-lock.json

      - name: Install backend deps
        run: npm ci

      - name: Install frontend deps
        run: npm --prefix ./web ci

      - name: Build all
        run: npm run build:all

      - name: Apply D1 migrations (staging)
        run: npm run db:migrate:staging
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy Worker (staging)
        run: npm run deploy:staging
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Smoke test (staging)
        if: ${{ secrets.STAGING_BASE_URL != '' }}
        run: node ./scripts/smoke.mjs "${{ secrets.STAGING_BASE_URL }}"

  deploy-production:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [verify]
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            web/package-lock.json

      - name: Install backend deps
        run: npm ci

      - name: Install frontend deps
        run: npm --prefix ./web ci

      - name: Build all
        run: npm run build:all

      - name: Apply D1 migrations (production)
        run: npm run db:migrate:prod
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy Worker (production)
        run: npm run deploy:prod
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Smoke test (production)
        if: ${{ secrets.PRODUCTION_BASE_URL != '' }}
        run: node ./scripts/smoke.mjs "${{ secrets.PRODUCTION_BASE_URL }}"
