name = "dopamine"
main = "src/index.ts"
compatibility_date = "2024-09-10"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = "./web/dist"
not_found_handling = "single-page-application"
binding = "ASSETS"
run_worker_first = true

# ─── D1 Database ────────────────────────────────────────────────────────────
[[d1_databases]]
binding = "DB"
database_name = "dopamine-db"
database_id = "98ad4284-f530-4917-8161-0a2a0561c88b"
migrations_dir = "migrations"

# ─── KV Namespaces ──────────────────────────────────────────────────────────
[[kv_namespaces]]
binding = "KV"
id = "187a32040f584bb58e092badbde743c4"
preview_id = "91a98c555cd04e2cb19c4c13b83ae1b9"

# ─── R2 Bucket ──────────────────────────────────────────────────────────────
[[r2_buckets]]
binding = "R2_BUCKET"
bucket_name = "dopamine-media"

# ─── Environment Variables ──────────────────────────────────────────────────
[vars]
ENVIRONMENT = "production"
JWT_EXPIRES_IN = "604800"
EXERCISE_CACHE_TTL = "3600"
MAX_UPLOAD_SIZE_MB = "5"
EXERCISEDB_BASE_URL = "https://exercisedb.p.rapidapi.com"
WGER_BASE_URL = "https://wger.de/api/v2"
APP_NAME = "Dopamine Fitness"
APP_ALLOWED_ORIGINS = "https://dopamine.limonmilion2007.workers.dev"
STATS_CACHE_TTL = "120"
CHECKINS_CACHE_TTL = "60"
GOOGLE_CLIENT_ID = "69754675826-uuilvialdp4ma491ufmfqu8vapl22pnv.apps.googleusercontent.com"
GOOGLE_REDIRECT_URI = "https://dopamine.limonmilion2007.workers.dev/api/auth/google/callback"
ADMIN_EMAILS = "limonmilion2007@gmail.com"

# ─── Secrets (set via: wrangler secret put SECRET_NAME) ─────────────────────
# JWT_SECRET
# EXERCISEDB_API_KEY
# NINJAS_API_KEY         ← API-Ninjas (optional, for difficulty + instructions)
# GOOGLE_CLIENT_SECRET
# BCRYPT_ROUNDS (optional, default 12)

# ─── Local Development ──────────────────────────────────────────────────────
[dev]
port = 8787
local_protocol = "http"

# ─── Environments ───────────────────────────────────────────────────────────
[env.staging]
name = "dopamine-fitness-staging"
vars = { ENVIRONMENT = "staging", APP_ALLOWED_ORIGINS = "https://staging.example.com" }

[env.staging.assets]
directory = "./web/dist"
not_found_handling = "single-page-application"
run_worker_first = true

[[env.staging.d1_databases]]
binding = "DB"
database_name = "dopamine-db-staging"
database_id = "REPLACE_WITH_STAGING_D1_ID"
